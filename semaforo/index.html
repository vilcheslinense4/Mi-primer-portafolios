<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Semáforo Inteligente</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #eee; margin: 0; padding: 20px; }
        .semaforo { width: 60px; background: #333; padding: 10px; border-radius: 15px; }
        .luz { width: 50px; height: 50px; background: #444; border-radius: 50%; margin: 10px auto; opacity: 0.2; }
        .rojo { background: red; box-shadow: 0 0 20px red; opacity: 1; }
        .ambar { background: orange; box-shadow: 0 0 20px orange; opacity: 1; }
        .verde { background: #00ff00; box-shadow: 0 0 20px #00ff00; opacity: 1; }
        #contador { font-size: 3rem; font-weight: bold; margin: 10px; color: #333; }
        .calle { width: 100%; max-width: 400px; height: 120px; background: #555; position: relative; overflow: hidden; border-top: 4px dashed white; border-bottom: 4px dashed white; margin-top: 20px; }
        .objeto { position: absolute; font-size: 40px; top: 30px; }
        @keyframes moverCoche { from { left: -60px; } to { left: 110%; } }
        .animar-coche { animation: moverCoche 3s infinite linear; }
        @keyframes cruzarPeaton { from { top: 130px; } to { top: -60px; } }
        .animar-peaton { animation: cruzarPeaton 4s infinite linear; left: 45%; }
    </style>
</head>
<body>
    <h1>🚦 Semáforo Pro</h1>
    <div id="contador">5</div>
    <div class="semaforo">
        <div id="luz-roja" class="luz"></div>
        <div id="luz-ambar" class="luz"></div>
        <div id="luz-verde" class="luz"></div>
    </div>
    <div class="calle">
        <div id="coche" class="objeto">🚗</div>
        <div id="peaton" class="objeto">🏃</div>
    </div>
    <script>
        let tiempo = 5;
        let estado = 'verde';
        const txtContador = document.getElementById('contador');
        const coche = document.getElementById('coche');
        const peaton = document.getElementById('peaton');
        function cambiar() {
            document.getElementById('luz-roja').className = 'luz';
            document.getElementById('luz-ambar').className = 'luz';
            document.getElementById('luz-verde').className = 'luz';
            if (estado === 'verde') {
                document.getElementById('luz-verde').classList.add('verde');
                coche.className = 'objeto animar-coche';
                peaton.style.display = 'none';
                coche.style.display = 'block';
            } else if (estado === 'ambar') {
                document.getElementById('luz-ambar').classList.add('ambar');
            } else {
                document.getElementById('luz-roja').classList.add('rojo');
                coche.className = 'objeto';
                coche.style.display = 'none';
                peaton.style.display = 'block';
                peaton.className = 'objeto animar-peaton';
            }
        }
        setInterval(() => {
            tiempo--;
            if (tiempo < 0) {
                if (estado === 'verde') { estado = 'ambar'; tiempo = 2; }
                else if (estado === 'ambar') { estado = 'rojo'; tiempo = 5; }
                else { estado = 'verde'; tiempo = 5; }
                cambiar();
            }
            txtContador.innerText = tiempo;
        }, 1000);
        cambiar();
    </script>
</body>
</html>
