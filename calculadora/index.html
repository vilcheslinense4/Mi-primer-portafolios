<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro</title>
    <style>
        /* Diseño para rellenar la página como el semáforo */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #cbd5e0; 
            margin: 0; 
            padding: 20px; 
        }

        .btn-volver {
            text-decoration: none;
            background: #2d3748;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            margin-bottom: 30px;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .contenedor-calc {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #cbd5e0;
            border-radius: 10px;
            font-size: 1.2rem;
            text-align: center;
        }

        .botones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #4a5568;
            color: white;
            transition: 0.2s;
        }

        button:hover { background: #2d3748; }
        
        #resultado {
            margin-top: 25px;
            color: #2d3748;
            font-size: 1.5rem;
            background: #edf2f7;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- Botón de navegación -->
    <a href="../index.html" class="btn-volver">⬅ Volver al Portafolios</a>

    <div class="contenedor-calc">
        <h1>🧮 Calculadora</h1>

        <input type="number" id="num1" placeholder="Número 1">
        <input type="number" id="num2" placeholder="Número 2">

        <div class="botones">
            <button onclick="operar('+')">Sumar</button>
            <button onclick="operar('-')">Restar</button>
            <button onclick="operar('*')">Multiplicar</button>
            <button onclick="operar('/')">Dividir</button>
        </div>

        <h2 id="resultado">Resultado: 0</h2>
    </div>

    <script>
        // Lógica simplificada en un solo lugar
        function operar(simbolo) {
            const n1 = parseFloat(document.getElementById('num1').value);
            const n2 = parseFloat(document.getElementById('num2').value);
            const res = document.getElementById('resultado');

            if (isNaN(n1) || isNaN(n2)) {
                res.innerText = "Error: Pon números";
                return;
            }

            let calculo;
            if (simbolo === '+') calculo = n1 + n2;
            if (simbolo === '-') calculo = n1 - n2;
            if (simbolo === '*') calculo = n1 * n2;
            if (simbolo === '/') calculo = n2 !== 0 ? n1 / n2 : "Infinito";

            res.innerText = "Resultado: " + calculo;
        }
    </script>
</body>
</html>
