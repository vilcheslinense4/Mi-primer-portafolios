<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | VilchesLinense4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.8rem; margin-bottom: 10px; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .info-tiempo { background: rgba(255, 255, 255, 0.1); padding: 15px 35px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); text-align: center; margin-bottom: 40px; }
        #reloj { display: block; font-size: 2.2rem; font-weight: bold; color: #00d2ff; }
        .container { width: 100%; max-width: 1000px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .proyecto { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 25px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.2); transition: 0.4s; display: flex; flex-direction: column; justify-content: space-between; }
        .proyecto:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.2); border-color: #00d2ff; }
        h3 { color: #00d2ff; margin-bottom: 12px; font-size: 1.4rem; }
        .btn { background: #00d2ff; color: white; text-decoration: none; padding: 12px; border-radius: 15px; text-align: center; font-weight: bold; transition: 0.3s; }
    </style>
</head>
<body>
    <header>
        <h1>VilchesLinense4</h1>
        <div class="info-tiempo"><span id="reloj"></span></div>
    </header>
    <div class="container">
        <div class="proyecto">
            <h3>🌤️ App del Clima Pro</h3>
            <a href="https://vilcheslinense4.github.io/app-clima-pro/" class="btn">Abrir App</a>
        </div>
        <div class="proyecto">
            <h3>💱 Conversor de Divisas</h3>
            <a href="https://vilcheslinense4.github.io/conversor-divisas/" class="btn">Ver Proyecto</a>
        </div>
        <div class="proyecto">
            <h3>✅ Lista de Tareas</h3>
            <a href="https://vilcheslinense4.github.io/lista-tareas-js/" class="btn">Ver Proyecto</a>
        </div>
        <div class="proyecto">
            <h3>📲 Generador QR</h3>
            <a href="https://vilcheslinense4.github.io/generador-qr/" class="btn">Ver Proyecto</a>
        </div>
    </div>
    <script>
        function actualizar() { document.getElementById('reloj').innerText = new Date().toLocaleTimeString('es-ES'); }
        setInterval(actualizar, 1000); actualizar();
    </script>
</body>
</html>
